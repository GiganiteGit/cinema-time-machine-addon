<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Cinema Time Machine">
  <defs>
    <radialGradient id="tile" cx="50%" cy="36%" r="78%">
      <stop offset="0%" stop-color="#1c2433"/>
      <stop offset="100%" stop-color="#0f1115"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4d27e"/>
      <stop offset="100%" stop-color="#d89a36"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="104" fill="url(#tile)"/>

  <!-- film-reel outer ring -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#gold)" stroke-width="16"/>

  <!-- 12 reel perforations doubling as hour ticks -->
  <g fill="url(#gold)">
    <circle cx="256" cy="140" r="14"/>
    <circle cx="314" cy="156" r="14"/>
    <circle cx="357" cy="198" r="14"/>
    <circle cx="372" cy="256" r="14"/>
    <circle cx="357" cy="314" r="14"/>
    <circle cx="314" cy="356" r="14"/>
    <circle cx="256" cy="372" r="14"/>
    <circle cx="198" cy="356" r="14"/>
    <circle cx="155" cy="314" r="14"/>
    <circle cx="140" cy="256" r="14"/>
    <circle cx="155" cy="198" r="14"/>
    <circle cx="198" cy="156" r="14"/>
  </g>

  <!-- clock hands (minute to 12, hour to ~2) -->
  <line x1="256" y1="256" x2="256" y2="172" stroke="url(#gold)" stroke-width="13" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="306" y2="226" stroke="url(#gold)" stroke-width="13" stroke-linecap="round"/>

  <!-- reel hub -->
  <circle cx="256" cy="256" r="30" fill="url(#gold)"/>
  <circle cx="256" cy="256" r="11" fill="#0f1115"/>
</svg>
